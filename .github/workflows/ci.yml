name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Install dependencies
        run: uv sync --group dev
      - name: Run ruff
        run: uv run ruff check src tests
      - name: Run ruff format check
        run: uv run ruff format --check src tests

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: uv sync --group dev
      - name: Run tests
        run: uv run pytest tests/unit tests/integration tests/e2e -v --tb=short --ignore=tests/unit/test_api_app.py --ignore=tests/unit/test_api_routes.py
      - name: Run tests with coverage
        run: uv run pytest tests/unit tests/integration tests/e2e --cov=src/imbalance --cov-report=term-missing --cov-report=xml --ignore=tests/unit/test_api_app.py --ignore=tests/unit/test_api_routes.py

  graph:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Install dependencies
        run: uv sync --group dev
      - name: Run graph quality checks
        run: make graph-check
