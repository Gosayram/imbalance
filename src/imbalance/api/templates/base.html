<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}imbalance{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <style>
        nav { margin-bottom: 1rem; }
        .muted { color: var(--pico-muted-color); }
        .tag { display: inline-block; background: var(--pico-primary-background); color: var(--pico-primary-inverse); padding: 0.15rem 0.5rem; border-radius: 4px; font-size: 0.8rem; margin-right: 0.3rem; }
        .score { font-size: 0.75rem; color: var(--pico-muted-color); }
        .meter-bar { height: 8px; background: var(--pico-muted-color); border-radius: 4px; overflow: hidden; }
        .meter-fill { height: 100%; background: var(--pico-primary-background); transition: width 0.3s; }
    </style>
</head>
<body>
    <nav class="container">
        <ul>
            <li><strong><a href="/">imbalance</a></strong></li>
            <li><a href="/wiki">Wiki</a></li>
            <li><a href="/sessions">Sessions</a></li>
            <li><a href="/queue">Queue</a></li>
        </ul>
        <ul>
            <li hx-get="/api/status" hx-trigger="every 30s" hx-swap="innerHTML">&nbsp;</li>
        </ul>
    </nav>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
