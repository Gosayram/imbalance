{% for section in sections %}
<tr>
    <td><span class="badge badge-success">{{ section.section }}</span></td>
    <td><a href="/ui/wiki/{{ section.slug }}">{{ section.slug }}</a></td>
    <td>{{ section.token_count }}</td>
    <td style="font-size: 0.75rem; color: var(--text-secondary);">{{ section.updated_at or '' }}</td>
    <td>
        <a href="/ui/wiki/{{ section.slug }}" class="btn" style="padding: 0.25rem 0.5rem; font-size: 0.75rem;">View</a>
    </td>
</tr>
{% endfor %}
{% if not sections %}
<tr>
    <td colspan="5" style="color: var(--text-secondary); text-align: center;">No sections found</td>
</tr>
{% endif %}
