{% for entry in history %}
<div style="border-bottom: 1px solid var(--border); padding: 0.5rem 0;">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <span class="badge">{{ entry.change_type }}</span>
        <span style="font-size: 0.75rem; color: var(--text-secondary);">{{ entry.changed_at }}</span>
    </div>
    <div style="font-size: 0.75rem; color: var(--text-secondary); margin-top: 0.25rem;">by {{ entry.changed_by or 'unknown' }}</div>
</div>
{% endfor %}
{% if not history %}
<div style="color: var(--text-secondary); text-align: center; padding: 1rem;">No history</div>
{% endif %}
