{% extends "base.html" %}
{% set active = 'search' %}

{% block title %}Search - imbalance{% endblock %}

{% block content %}
<h1 style="font-size: 1.5rem; margin-bottom: 1.5rem;">Search Knowledge Base</h1>

<div class="card">
    <form hx-get="/ui/api/search" hx-target="#search-results" hx-indicator="#search-spinner">
        <div style="display: flex; gap: 1rem; margin-bottom: 1rem;">
            <input type="text" name="q" placeholder="Search query..." style="flex: 1;" autofocus>
            <input type="number" name="budget" value="2000" min="100" max="10000" style="width: 120px;" placeholder="Budget">
            <button type="submit" class="btn btn-primary">Search</button>
        </div>
    </form>
</div>

<div id="search-spinner" class="htmx-indicator" style="text-align: center; padding: 2rem; color: var(--text-secondary);">
    Searching...
</div>

<div id="search-results">
    <div class="card" style="text-align: center; padding: 3rem; color: var(--text-secondary);">
        Enter a query to search the knowledge base
    </div>
</div>
{% endblock %}
